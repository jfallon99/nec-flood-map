<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Flood Line Was Wrong — NEC Sea Level Correction</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; font-family: "Inter", "Helvetica Neue", sans-serif; background: #0a0a0a; }
    #map { width: 100%; height: 100vh; }

    /* ---- Loader ---- */
    #loader {
      position: fixed; inset: 0; z-index: 9999;
      background: #0a0a0a;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity .5s ease;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .load-title { color: #fff; font-size: 1.5rem; font-weight: 700; letter-spacing: .04em; margin-bottom: .5rem; }
    .load-sub { color: #888; font-size: .85rem; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 2rem; }
    .load-bar-wrap { width: 200px; height: 3px; background: #222; border-radius: 2px; overflow: hidden; }
    .load-bar { height: 100%; width: 0%; background: #1c64f2; border-radius: 2px; transition: width .4s ease; }
    .load-text { color: #555; font-size: .75rem; margin-top: .75rem; letter-spacing: .04em; }

    /* ---- Labels (city markers) ---- */
    .city-label {
      background: rgba(10,10,10,.75);
      color: #fff; font-size: 11px; font-weight: 600;
      padding: 3px 7px; border-radius: 3px;
      border: 1px solid rgba(255,255,255,.15);
      white-space: nowrap; pointer-events: none;
    }

    /* ---- Legend chips ---- */
    #legend {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      z-index: 800; display: flex; gap: 10px; align-items: center;
      background: rgba(10,10,10,.82); backdrop-filter: blur(6px);
      padding: 8px 16px; border-radius: 30px;
      border: 1px solid rgba(255,255,255,.1);
    }
    .chip { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #ccc; letter-spacing: .03em; }
    .chip-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .chip-div { width: 1px; height: 20px; background: rgba(255,255,255,.15); }

    /* ---- Slider handle ---- */
    #slider-handle {
      position: fixed; top: 0; bottom: 0;
      width: 3px; background: #fff;
      z-index: 700; cursor: ew-resize;
      transform: translateX(-50%);
      box-shadow: 0 0 12px rgba(0,0,0,.5);
    }
    #slider-knob {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 38px; height: 38px;
      background: #fff; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 12px rgba(0,0,0,.4);
      font-size: 14px; color: #333; user-select: none;
    }

    /* ---- Corner label chips ---- */
    .corner-label {
      position: fixed; top: 16px; z-index: 800;
      font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
      padding: 5px 12px; border-radius: 20px;
      border: 1px solid rgba(255,255,255,.2);
      backdrop-filter: blur(4px);
    }
    #label-before { left: 16px; background: rgba(40,40,40,.85); color: #aaa; }
    #label-after  { right: 16px; background: rgba(28,100,242,.25); color: #93b9ff; border-color: rgba(28,100,242,.4); }

    /* ---- Drag hint ---- */
    #drag-hint {
      position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
      z-index: 800; color: #777; font-size: 12px; letter-spacing: .05em;
      opacity: 0; transition: opacity .6s ease;
      white-space: nowrap;
    }
    #drag-hint.visible { opacity: 1; }
  </style>
</head>
<body>

  <div id="loader">
    <div class="load-title">The Flood Line Was Wrong</div>
    <div class="load-sub">NEC Sea Level Correction &mdash; Boston to DC</div>
    <div class="load-bar-wrap"><div class="load-bar" id="load-bar"></div></div>
    <div class="load-text" id="load-text">Loading flood data…</div>
  </div>

  <div id="map"></div>

  <div id="slider-handle" style="left:50%">
    <div id="slider-knob">&#x21C4;</div>
  </div>

  <div class="corner-label" id="label-before">Old Assumption</div>
  <div class="corner-label" id="label-after">Corrected +1 ft Boundary</div>

  <div id="legend">
    <div class="chip">
      <div class="chip-dot" style="background:#6b90c4;opacity:.8"></div>
      <span>Previously mapped flood zone (0 ft)</span>
    </div>
    <div class="chip-div"></div>
    <div class="chip">
      <div class="chip-dot" style="background:#1c64f2"></div>
      <span>Hidden risk — missed by old baseline</span>
    </div>
  </div>

  <div id="drag-hint">← drag to compare →</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    var map = L.map("map", {
      center: [39.5, -74.8], zoom: 7,
      zoomControl: true, attributionControl: true
    });

    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png", {
      attribution: "© CartoDB © OpenStreetMap contributors",
      subdomains: "abcd", maxZoom: 19
    }).addTo(map);

    // Labels on top (always visible)
    L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_only_labels/{z}/{x}/{y}{r}.png", {
      subdomains: "abcd", maxZoom: 19, pane: "shadowPane"
    }).addTo(map);

    // City markers
    var cities = [
      { name: "Boston",       latlng: [42.36, -71.06] },
      { name: "Providence",   latlng: [41.82, -71.42] },
      { name: "New Haven",    latlng: [41.31, -72.92] },
      { name: "New York",     latlng: [40.71, -74.01] },
      { name: "Philadelphia", latlng: [39.95, -75.17] },
      { name: "Baltimore",    latlng: [39.29, -76.61] },
      { name: "Washington DC",latlng: [38.91, -77.04] },
    ];
    cities.forEach(function(c) {
      L.marker(c.latlng, {
        icon: L.divIcon({ className: "city-label", html: c.name, iconAnchor: [0, 10] }),
        interactive: false
      }).addTo(map);
    });

    // Create two custom panes
    map.createPane("beforePane"); // left: old 0ft baseline
    map.createPane("afterPane");  // right: gap zone (new risk)
    map.getPane("beforePane").style.zIndex = 350;
    map.getPane("afterPane").style.zIndex  = 360;

    // Slider logic
    var mapEl  = document.getElementById("map");
    var handle = document.getElementById("slider-handle");
    var loader = document.getElementById("loader");
    var bar    = document.getElementById("load-bar");
    var loadTxt= document.getElementById("load-text");
    var dragHint = document.getElementById("drag-hint");
    var hasUsed = false;

    function updateSlider(x) {
      handle.style.left = x + "px";
      var mapW = mapEl.offsetWidth, mapH = mapEl.offsetHeight;
      var nw = map.containerPointToLayerPoint([0,   0]);
      var se = map.containerPointToLayerPoint([mapW, mapH]);
      // beforePane: only LEFT of slider
      map.getPane("beforePane").style.clip =
        "rect(" + nw.y + "px," + (nw.x + x) + "px," + se.y + "px," + nw.x + "px)";
      // afterPane: only RIGHT of slider
      map.getPane("afterPane").style.clip =
        "rect(" + nw.y + "px," + se.x + "px," + se.y + "px," + (nw.x + x) + "px)";
    }

    map.on("move zoom", function() { updateSlider(parseFloat(handle.style.left)); });

    // Drag
    var dragging = false;
    handle.addEventListener("mousedown",  function(e) { dragging = true; hasUsed = true; dragHint.classList.remove("visible"); e.preventDefault(); });
    handle.addEventListener("touchstart", function(e) { dragging = true; hasUsed = true; dragHint.classList.remove("visible"); }, { passive: true });
    window.addEventListener("mousemove",  function(e) { if (dragging) updateSlider(e.clientX); });
    window.addEventListener("touchmove",  function(e) { if (dragging) updateSlider(e.touches[0].clientX); }, { passive: true });
    window.addEventListener("mouseup",    function()  { dragging = false; });
    window.addEventListener("touchend",   function()  { dragging = false; });

    function easeInOut(t) { return t < .5 ? 2*t*t : -1+(4-2*t)*t; }
    function animateTo(from, to, dur, done) {
      var t0 = performance.now();
      function frame(now) {
        var t = Math.min((now - t0) / dur, 1);
        updateSlider(from + (to - from) * easeInOut(t));
        if (t < 1) { requestAnimationFrame(frame); }
        else if (done) { done(); }
      }
      requestAnimationFrame(frame);
    }

    // Load both GeoJSON files
    var baselineLoaded = false, gapLoaded = false;
    function checkBothLoaded() {
      if (!baselineLoaded || !gapLoaded) return;
      bar.style.width = "100%";
      setTimeout(function() {
        loader.classList.add("hidden");
        setTimeout(function() { loader.style.display = "none"; }, 500);
      }, 300);
      // Start at right edge, sweep to centre
      updateSlider(mapEl.offsetWidth - 60);
      setTimeout(function() {
        animateTo(mapEl.offsetWidth - 60, mapEl.offsetWidth * 0.5, 2400, function() {
          if (!hasUsed) dragHint.classList.add("visible");
        });
      }, 400);
    }

    // Load baseline (left / before pane)
    bar.style.width = "20%";
    loadTxt.textContent = "Loading baseline flood zone…";
    fetch("baseline_zone.geojson")
      .then(function(r) { if (!r.ok) throw new Error("baseline HTTP " + r.status); return r.json(); })
      .then(function(data) {
        L.geoJSON(data, {
          pane: "beforePane",
          style: { fillColor: "#6b90c4", fillOpacity: 0.55, color: "transparent", weight: 0 }
        }).addTo(map);
        bar.style.width = "55%";
        loadTxt.textContent = "Loading corrected boundary…";
        baselineLoaded = true;
        checkBothLoaded();
      })
      .catch(function(err) {
        loadTxt.textContent = "Error — " + err.message;
        console.error(err);
      });

    // Load gap zone (right / after pane)
    fetch("gap_zone.geojson")
      .then(function(r) { if (!r.ok) throw new Error("gap HTTP " + r.status); return r.json(); })
      .then(function(data) {
        L.geoJSON(data, {
          pane: "afterPane",
          style: { fillColor: "#1c64f2", fillOpacity: 0.62, color: "transparent", weight: 0 }
        }).addTo(map);
        bar.style.width = "90%";
        gapLoaded = true;
        checkBothLoaded();
      })
      .catch(function(err) {
        loadTxt.textContent = "Error — " + err.message;
        console.error(err);
      });

  </script>
</body>
</html>
